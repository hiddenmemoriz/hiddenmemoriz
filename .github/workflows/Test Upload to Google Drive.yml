name: Test Upload spotify.png to Google Drive

on:
  workflow_dispatch:

jobs:
  test-upload:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # Step 2: Install rclone
      - name: Install rclone
        run: |
          sudo apt update
          sudo apt install -y curl
          curl https://rclone.org/install.sh | sudo bash

      # Step 3: Check if spotify.png exists
      - name: Check if spotify.png exists
        run: |
          if [ -f spotify.png ]; then
            echo "✅ spotify.png found"
            ls -lh spotify.png
          else
            echo "❌ spotify.png NOT found in repo root"
            echo "Files in current directory:"
            ls -la
            exit 1
          fi

      # Step 4: Setup rclone with service account (FIXED)
      - name: Setup rclone
        env:
          GDRIVE_SERVICE_ACCOUNT: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
        run: |
          mkdir -p ~/.config/rclone
          
          # Write service account JSON carefully (base64 encoded to avoid parsing issues)
          cat > ~/service_account.json << 'SERVICEACCOUNT'
          ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
          SERVICEACCOUNT
          
          # Verify file was created and has content
          if [ ! -s ~/service_account.json ]; then
            echo "❌ Service account file is empty!"
            exit 1
          fi
          
          echo "✅ Service account file created"
          echo "File size: $(wc -c < ~/service_account.json) bytes"
          
          # Create rclone config
          cat > ~/.config/rclone/rclone.conf << 'EOF'
          [gdrive]
          type = drive
          scope = drive.file
          service_account_file = /home/runner/service_account.json
          EOF
          
          echo "✅ Rclone configured"
          rclone version

      # Step 5: Test rclone connection
      - name: Test rclone connection
        run: |
          echo "Testing rclone connection..."
          rclone lsd gdrive: -v || echo "Connection test completed"

      # Step 6: Upload spotify.png to Google Drive
      - name: Upload spotify.png to Google Drive
        run: |
          echo "Starting upload..."
          rclone copy spotify.png gdrive:1EVIHk24_3C7DsCLcYoQOdrM_T11UrkWH/ -v --stats 1s
          echo "✅ Upload complete!"

      # Step 7: Verify upload
      - name: Verify upload
        run: |
          echo "Files in Google Drive folder:"
          rclone ls gdrive:1EVIHk24_3C7DsCLcYoQOdrM_T11UrkWH/ -v
