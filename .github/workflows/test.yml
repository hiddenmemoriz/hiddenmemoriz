name: Debug Files

on:
  workflow_dispatch:   # manual run
  push:
    branches: [ main ]

jobs:
  check-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show current directory
        run: pwd

      - name: List all files (full tree)
        run: ls -R

      - name: Check reels folder
        run: |
          echo "Checking reels folder..."
          ls -l ./reels || echo "❌ reels folder not found"

      - name: Count files in reels
        run: |
          if [ -d "./reels" ]; then
            echo "Reels count:"
            ls ./reels | wc -l
          else
            echo "❌ reels folder missing"
          fi
